name: Build & Release

on:
  push:
    branches: [main]
    # Match both `v1.3.0` and a bare `1.3.0` so a missing "v" doesn't skip the build.
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
  # Also build when a GitHub Release is published (covers releases created via the UI).
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build single-file template
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          grep -q "{{ user.username }}" dist/index.html
          echo "dist/index.html: $(du -h dist/index.html | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: index.html
          path: dist/index.html

      # Publish to a release so it can be installed via:
      #   wget .../releases/latest/download/index.html
      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/index.html
          generate_release_notes: true
