name: Build & Release

on:
  push:
    branches: ["**"]
  pull_request:
  # Also build when a GitHub Release is published (covers releases created via the UI).
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build single-file template
        run: npm run build

      - name: Verify pongo2 directive guard
        run: npm run guard

      - name: Assert dist/index.html is self-contained
        run: |
          set -e
          f=dist/index.html
          test -f "$f"
          grep -q "{{ user.username }}" "$f"
          # No external resource loads of any kind.
          if grep -Eiq '<link[^>]+rel=|<script[^>]+src=|@import|url\(["'\'']?https?:' "$f"; then
            echo "::error::dist/index.html references an external resource"; exit 1
          fi
          echo "OK: $(du -h "$f" | cut -f1) self-contained build"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: index.html
          path: dist/index.html
          if-no-files-found: error

      # Publish to a release so it can be installed via:
      #   wget .../releases/latest/download/index.html
      - name: Package hosting bundle
        run: |
          cd dist/hosting
          zip -r ../hosting.zip . -x '*.DS_Store'
          cd ../..
          # Verify .htaccess is present with its leading dot (mirrors the build-time
          # guard in copyHosting())
          if ! unzip -l dist/hosting.zip | grep -q '\.htaccess'; then
            echo "::error::hosting.zip is missing .htaccess (leading dot stripped)"
            exit 1
          fi

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/index.html
            dist/hosting.zip
          generate_release_notes: true
