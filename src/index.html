<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="auroradark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="robots" content="noindex, nofollow" />
    <title>{{ user.username }} · Subscription</title>

    <!-- Fonts: Inter (latin, Google Fonts) + Arad (farsi, jsDelivr @font-face in CSS). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />

    <!-- Phosphor Icons (single regular webfont, pinned). -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />

    <!-- Built Tailwind v4 + DaisyUI v5 CSS is inlined here at build time. -->
    <!--AURORA_INLINE_CSS-->

    <!-- Pinned CDN libraries (hardcoded versions, deferred). -->
    <script defer src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.0/dist/cdn.min.js"></script>
</head>

<body class="min-h-screen text-base-content">
    <!-- Loading splash (visible before Alpine boots; removed from init()). -->
    <div id="aurora-loader">
        <div class="flex flex-col items-center gap-4">
            <div class="aurora-spinner"></div>
            <p class="text-lg font-extrabold tracking-tight gradient-text">Subscription</p>
        </div>
    </div>
    <script>
        // Safety net: never let the splash trap the user if Alpine/CDN fails.
        setTimeout(function () {
            var l = document.getElementById("aurora-loader");
            if (l && !l.classList.contains("is-done")) {
                l.classList.add("is-done");
                setTimeout(function () { l.remove(); }, 500);
            }
        }, 8000);
    </script>

    <div class="aurora-bg" aria-hidden="true"></div>

    <!--
      ====================================================================
       DATA ISLAND — bound to the REAL Rebecca (pongo2) context.
       Numbers/strings ride on data-* attributes (browser decodes entities
       on read); config links ride as element text (read via textContent),
       which sidesteps JSON/JS escaping issues with unicode remark names.
      ====================================================================
    -->
    <div id="aurora-data" hidden
        data-username="{{ user.username }}"
        data-status="{{ user.status }}"
        data-status-class="{{ user.status_class }}"
        data-used="{{ user.used_traffic }}"
        data-limit="{% if user.data_limit %}{{ user.data_limit }}{% endif %}"
        data-reset-strategy="{{ user.data_limit_reset_strategy }}"
        data-expire="{% if user.expire %}{{ user.expire }}{% endif %}"
        data-remaining-days="{{ remaining_days }}"
        data-subscription-url="{{ user.subscription_url }}"
        data-support-url="{{ support_url }}"
        data-usage-url="{{ usage_url }}"
        data-service-name="{{ user.service_name }}">
    </div>
    <div id="aurora-configs" hidden>{% for link in links %}<span class="cfg">{{ link }}</span>{% endfor %}</div>

    <main x-data="aurora()" x-init="init()" x-cloak class="relative mx-auto w-full max-w-3xl px-4 pb-16 pt-5 sm:px-6">

        <!-- ============================ TOP BAR ============================ -->
        <header class="reveal relative z-50 mb-6 flex items-center justify-between gap-3">
            <div class="flex items-center gap-2.5">
                <!-- Logo placeholder: an empty circle (per request). -->
                <div class="h-11 w-11 shrink-0 rounded-full border-2 border-base-content/25"></div>
                <div class="leading-tight">
                    <p class="text-xl font-extrabold tracking-tight gradient-text" x-text="t('brand')"></p>
                    <p class="text-[11px] text-base-content/50" x-text="t('tagline')"></p>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <!-- Language switcher -->
                <button class="btn btn-sm btn-ghost glass gap-1.5 font-semibold" @click="toggleLang()"
                    :aria-label="t('switch_lang')">
                    <i class="ph ph-globe text-lg opacity-70"></i>
                    <span x-text="lang === 'en' ? 'EN' : 'فا'"></span>
                </button>

                <!-- Theme switcher (Alpine-controlled popover; renders above all cards) -->
                <div class="relative" @click.outside="themeOpen = false">
                    <button class="btn btn-sm btn-ghost glass" @click="themeOpen = !themeOpen"
                        :aria-label="t('switch_theme')" aria-haspopup="true" :aria-expanded="themeOpen">
                        <i class="ph ph-palette text-lg"></i>
                    </button>
                    <ul x-show="themeOpen" x-cloak x-transition.origin.top
                        class="menu glass absolute end-0 z-[100] mt-2 w-48 gap-0.5 rounded-2xl p-2 shadow-2xl shadow-black/30">
                        <template x-for="th in themes" :key="th.id">
                            <li>
                                <button @click="setTheme(th.id); themeOpen = false" class="justify-between rounded-xl"
                                    :class="theme === th.id && 'active font-semibold'">
                                    <span class="flex items-center gap-2">
                                        <span class="h-3.5 w-3.5 rounded-full border border-base-content/20" :style="`background:${th.swatch}`"></span>
                                        <span x-text="th.label"></span>
                                    </span>
                                    <i class="ph ph-check text-base text-primary" x-show="theme === th.id"></i>
                                </button>
                            </li>
                        </template>
                    </ul>
                </div>
            </div>
        </header>

        <!-- ===================== STATUS BANNER (edge cases) ===================== -->
        <template x-if="statusClass !== 'active'">
            <div class="reveal alert mb-5 items-center rounded-2xl glass border-0"
                :class="{'text-warning': statusClass==='expired','text-error': statusClass==='limited','text-base-content/70': statusClass==='disabled'}">
                <i class="ph ph-warning-circle shrink-0 text-xl"></i>
                <span class="text-sm font-medium" x-text="t('banner_' + statusClass)"></span>
            </div>
        </template>

        <!-- ========================= SERVICE INFO CARD ========================= -->
        <section class="reveal card glass lift mb-6 overflow-hidden rounded-[1.5rem] shadow-2xl shadow-black/20">
            <div class="card-body gap-5 p-5 sm:p-7">
                <div class="flex flex-wrap items-center justify-between gap-3">
                    <div class="min-w-0">
                        <p class="text-xs uppercase tracking-widest text-base-content/50" x-text="t('account')"></p>
                        <h1 class="truncate text-2xl font-extrabold sm:text-3xl" x-text="username"></h1>
                        <p class="mt-0.5 truncate text-sm text-base-content/60" x-show="serviceName" x-text="serviceName"></p>
                    </div>
                    <span class="badge badge-lg gap-1.5 border-0 px-3 py-3.5 font-semibold"
                        :class="statusBadge">
                        <span class="h-2 w-2 rounded-full bg-current"></span>
                        <span x-text="t('status_' + statusClass)"></span>
                    </span>
                </div>

                <!-- Dual rings: data usage + time remaining (rounded caps) -->
                <div class="flex items-center justify-center gap-6 py-1 sm:gap-14">
                    <!-- Usage ring -->
                    <div class="ring-wrap">
                        <svg class="ring-svg" viewBox="0 0 100 100" aria-hidden="true">
                            <circle class="ring-track" cx="50" cy="50" r="44" pathLength="100" />
                            <circle class="ring-fill" cx="50" cy="50" r="44" pathLength="100"
                                :style="`stroke:${usageRingColor}; stroke-dashoffset:${100 - (unlimited ? 100 : usagePercent)}`" />
                        </svg>
                        <div class="ring-label text-center leading-none">
                            <p class="text-2xl font-extrabold" x-text="unlimited ? '∞' : (usagePercent + '%')"></p>
                            <p class="mt-0.5 text-[10px] uppercase tracking-wider text-base-content/50" x-text="t('used')"></p>
                        </div>
                    </div>
                    <!-- Time-remaining ring -->
                    <div class="ring-wrap">
                        <svg class="ring-svg" viewBox="0 0 100 100" aria-hidden="true">
                            <circle class="ring-track" cx="50" cy="50" r="44" pathLength="100" />
                            <circle class="ring-fill" cx="50" cy="50" r="44" pathLength="100"
                                :style="`stroke:var(--color-${timeTone}); stroke-dashoffset:${100 - timePercent}`" />
                        </svg>
                        <div class="ring-label text-center leading-none">
                            <p class="text-2xl font-extrabold" x-text="neverExpire ? '∞' : remainingDays"></p>
                            <p class="mt-0.5 text-[10px] uppercase tracking-wider text-base-content/50" x-text="t('days')"></p>
                        </div>
                    </div>
                </div>

                <!-- Traffic + expiry stats -->
                <div class="grid grid-cols-2 gap-3 sm:grid-cols-4">
                    <div class="rounded-2xl bg-base-100/40 p-3.5">
                        <p class="text-[11px] uppercase tracking-wide text-base-content/50" x-text="t('used')"></p>
                        <p class="mt-1 text-lg font-bold" x-text="fmtBytes(used)"></p>
                    </div>
                    <div class="rounded-2xl bg-base-100/40 p-3.5">
                        <p class="text-[11px] uppercase tracking-wide text-base-content/50" x-text="t('total')"></p>
                        <p class="mt-1 text-lg font-bold" x-text="unlimited ? '∞' : fmtBytes(limit)"></p>
                    </div>
                    <div class="rounded-2xl bg-base-100/40 p-3.5">
                        <p class="text-[11px] uppercase tracking-wide text-base-content/50" x-text="t('remaining')"></p>
                        <p class="mt-1 text-lg font-bold text-accent" x-text="unlimited ? '∞' : fmtBytes(remainingBytes)"></p>
                    </div>
                    <div class="rounded-2xl bg-base-100/40 p-3.5">
                        <p class="text-[11px] uppercase tracking-wide text-base-content/50" x-text="t('expires')"></p>
                        <p class="mt-1 text-lg font-bold"
                            :class="!neverExpire && remainingDays <= 3 && 'text-error'"
                            x-text="neverExpire ? '∞' : fmtDate(expire)"></p>
                    </div>
                </div>

                <!-- Linear usage bar -->
                <div x-show="!unlimited" class="space-y-1.5">
                    <progress class="progress h-2.5 w-full"
                        :class="usagePercent >= 90 ? 'progress-error' : usagePercent >= 75 ? 'progress-warning' : 'progress-primary'"
                        :value="usagePercent" max="100"></progress>
                    <div class="flex justify-between text-[11px] text-base-content/50">
                        <span x-text="fmtBytes(used) + ' / ' + fmtBytes(limit)"></span>
                        <span x-text="usagePercent + '%'"></span>
                    </div>
                </div>
            </div>
        </section>

        <!-- ============================ CONFIGS ============================ -->
        <section class="reveal card glass mb-6 overflow-hidden rounded-[1.5rem] border-0 shadow-xl shadow-black/10">
            <!-- Collapsible header -->
            <button class="flex w-full items-center justify-between gap-2 p-4 sm:px-5"
                @click="configsOpen = !configsOpen" :aria-expanded="configsOpen">
                <span class="flex items-center gap-2 text-lg font-bold">
                    <i class="ph ph-list-bullets text-xl text-primary"></i>
                    <span x-text="t('configs')"></span>
                    <span class="badge badge-sm badge-primary badge-soft" x-text="configs.length"></span>
                </span>
                <i class="ph ph-caret-down chev text-xl text-base-content/50" :class="configsOpen && 'open'"></i>
            </button>

            <div class="collapsey" :class="configsOpen && 'open'">
                <div class="collapsey-inner">
                    <div class="px-4 pb-4 sm:px-5 sm:pb-5">
                        <!-- Bulk actions -->
                        <div class="mb-4 flex flex-wrap gap-2">
                            <button class="btn glass lift min-w-[8rem] flex-1 gap-2 rounded-2xl border-0 font-semibold" @click="copy(subscriptionUrl, 'sub')">
                                <i class="ph text-lg" :class="copied==='sub' ? 'ph-check text-success' : 'ph-link-simple'"></i>
                                <span x-text="copied==='sub' ? t('copied') : t('copy_sub')"></span>
                            </button>
                            <button class="btn glass lift min-w-[8rem] flex-1 gap-2 rounded-2xl border-0 font-semibold" @click="copyAll()" :disabled="!configs.length">
                                <i class="ph text-lg" :class="copied==='all' ? 'ph-check text-success' : 'ph-copy'"></i>
                                <span x-text="copied==='all' ? t('copied') : t('copy_all')"></span>
                            </button>
                            <!-- QR code of the subscription link itself -->
                            <button class="btn btn-square glass lift rounded-2xl border-0" @click="showSubQr()" :aria-label="t('sub_qr')">
                                <i class="ph ph-qr-code text-xl text-primary"></i>
                            </button>
                        </div>

                        <!-- Config list -->
                        <div class="space-y-2.5">
                            <template x-for="(cfg, i) in configs" :key="i">
                                <div class="group card glass lift rounded-2xl border-0">
                                    <div class="flex items-center gap-3 p-3">
                                        <div class="grid h-9 w-9 shrink-0 place-items-center rounded-xl bg-gradient-to-br from-primary/20 to-secondary/20 text-xs font-bold text-primary"
                                            x-text="cfg.protocol"></div>
                                        <div class="min-w-0 flex-1">
                                            <p class="truncate text-sm font-semibold" x-text="cfg.name || (t('config') + ' ' + (i+1))"></p>
                                            <p class="truncate font-mono text-[11px] text-base-content/40" x-text="cfg.raw"></p>
                                        </div>
                                        <button class="btn btn-circle btn-ghost btn-sm" @click="copy(cfg.raw, 'cfg-'+i)" :aria-label="t('copy')">
                                            <i class="ph text-lg" :class="copied==='cfg-'+i ? 'ph-check text-success' : 'ph-copy'"></i>
                                        </button>
                                        <button class="btn btn-circle btn-ghost btn-sm" @click="showQr(cfg)" :aria-label="t('qrcode')">
                                            <i class="ph ph-qr-code text-lg"></i>
                                        </button>
                                    </div>
                                </div>
                            </template>

                            <!-- Empty state -->
                            <template x-if="!configs.length">
                                <div class="card glass rounded-2xl border-0 p-10 text-center">
                                    <i class="ph ph-tray mx-auto text-5xl text-base-content/30"></i>
                                    <p class="mt-3 font-semibold" x-text="t('no_configs')"></p>
                                    <p class="mt-1 text-sm text-base-content/50" x-text="t('no_configs_hint')"></p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ============================== APPS ============================== -->
        <section class="reveal card glass mb-6 overflow-hidden rounded-[1.5rem] border-0 shadow-xl shadow-black/10" x-show="appsLoaded">
            <!-- Collapsible header -->
            <button class="flex w-full items-center justify-between gap-2 p-4 sm:px-5"
                @click="appsOpen = !appsOpen" :aria-expanded="appsOpen">
                <span class="flex items-center gap-2 text-lg font-bold">
                    <i class="ph ph-squares-four text-xl text-secondary"></i>
                    <span x-text="t('apps')"></span>
                </span>
                <i class="ph ph-caret-down chev text-xl text-base-content/50" :class="appsOpen && 'open'"></i>
            </button>

            <div class="collapsey" :class="appsOpen && 'open'">
                <div class="collapsey-inner">
                    <div class="px-4 pb-4 sm:px-5 sm:pb-5">
                        <!-- OS tabs — horizontally scrollable when they overflow -->
                        <div role="tablist" class="tabs tabs-box glass no-scrollbar mb-4 flex-nowrap overflow-x-auto rounded-2xl p-1">
                            <template x-for="os in osList" :key="os">
                                <button role="tab" class="tab shrink-0 gap-1.5 rounded-xl font-semibold transition"
                                    :class="activeOs === os && 'tab-active bg-primary/15 text-primary'"
                                    @click="activeOs = os">
                                    <i class="ph text-lg" :class="osIcon(os)"></i>
                                    <span x-text="os"></span>
                                </button>
                            </template>
                        </div>

                        <!-- App cards: vertically scrollable list on mobile -->
                        <div class="aurora-scroll grid max-h-[19rem] grid-cols-1 gap-2.5 overflow-y-auto pe-1 sm:max-h-none sm:grid-cols-2 sm:overflow-visible sm:pe-0">
                            <template x-for="app in appsForOs" :key="app.name">
                                <div class="card glass lift rounded-2xl border-0">
                                    <div class="flex items-center gap-3 p-3">
                                        <img :src="app.image" :alt="app.name" loading="lazy" decoding="async"
                                            class="h-11 w-11 shrink-0 rounded-xl bg-base-100/50 object-contain p-1"
                                            onerror="this.style.visibility='hidden'" />
                                        <div class="min-w-0 flex-1">
                                            <p class="truncate font-semibold" x-text="app.name"></p>
                                            <p class="text-[11px] text-base-content/50" x-text="t('tap_to_add')"></p>
                                        </div>
                                        <div class="flex items-center gap-1.5">
                                            <a class="btn btn-primary btn-sm rounded-xl font-semibold" :href="deepLink(app)"
                                                x-text="t('add')"></a>
                                            <a class="btn btn-ghost btn-sm glass gap-1 rounded-xl font-semibold" :href="downloadLink(app)"
                                                target="_blank" rel="noopener" x-show="downloadLink(app)" :aria-label="t('download')">
                                                <i class="ph ph-download-simple text-base"></i>
                                                <span class="hidden sm:inline" x-text="t('download')"></span>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ============================= FOOTER ============================= -->
        <footer class="reveal mt-8 flex flex-col items-center gap-3 text-center">
            <a x-show="supportUrl" :href="supportUrl" target="_blank" rel="noopener"
                class="btn btn-ghost btn-sm glass gap-2 rounded-2xl">
                <i class="ph ph-lifebuoy text-base"></i>
                <span x-text="t('support')"></span>
            </a>
            <p class="text-[11px] text-base-content/40">
                <span x-text="t('powered')"></span> ·
                <a href="https://github.com/Ho3einK84/Aurora" target="_blank" rel="noopener" class="link link-hover gradient-text font-semibold">Aurora</a>
            </p>
        </footer>

        <!-- ============================ QR MODAL ============================ -->
        <dialog id="qr_modal" class="modal modal-bottom sm:modal-middle" x-ref="qrModal">
            <div class="modal-box glass max-w-sm rounded-[1.5rem] border-0 text-center">
                <h3 class="mb-1 text-lg font-bold" x-text="qrTitle"></h3>
                <p class="mb-4 truncate font-mono text-[11px] text-base-content/40" x-text="qrText"></p>
                <div class="mx-auto grid aspect-square w-full max-w-[260px] place-items-center rounded-2xl bg-white p-4">
                    <div x-ref="qrBox" class="h-full w-full [&>svg]:h-full [&>svg]:w-full"></div>
                </div>
                <div class="modal-action mt-5 justify-center gap-2">
                    <button class="btn btn-primary flex-1 rounded-2xl font-semibold" @click="copy(qrText, 'qr')">
                        <span x-text="copied==='qr' ? t('copied') : t('copy')"></span>
                    </button>
                    <button class="btn btn-ghost glass flex-1 rounded-2xl" @click="closeQr()" x-text="t('close')"></button>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop" @click="closeQr()"><button>close</button></form>
        </dialog>
    </main>

    <!-- Aurora application logic is inlined here at build time. -->
    <!--AURORA_INLINE_JS-->
</body>

</html>
